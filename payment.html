<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment | HealthCare+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #e0f7fa, #f1f8e9);
      margin: 0;
      padding: 20px;
      color: #2e7d32;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #1b5e20;
    }

    .amount {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .methods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .option {
      border: 2px solid #a5d6a7;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #f9fbe7;
      transition: all 0.3s ease;
    }

    .option:hover {
      background: #e8f5e9;
      transform: scale(1.03);
    }

    .option.selected {
      border-color: #2e7d32;
      background: #c8e6c9;
      font-weight: bold;
    }

    .option img {
      width: 40px;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .methods {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Select Payment Method</h1>
    <div class="amount">
      Total Amount: ₹<span id="totalAmount">0</span>
    </div>
    <div class="methods">
      <div class="option" data-method="UPI">
        <img src="https://img.icons8.com/color/48/upi.png" alt="UPI" />
        UPI
      </div>
      <div class="option" data-method="Card">
        <img src="https://img.icons8.com/color/48/bank-card-back-side.png" alt="Card" />
        Debit/Credit Card
      </div>
      <div class="option" data-method="Netbanking">
        <img src="https://img.icons8.com/color/48/internet-banking.png" alt="Netbanking" />
        Netbanking
      </div>
      <div class="option" data-method="Wallet">
        <img src="https://img.icons8.com/color/48/wallet--v1.png" alt="Wallet" />
        Wallet
      </div>
      <div class="option" data-method="COD">
        <img src="https://img.icons8.com/external-flatart-icons-outline-flatarticons/64/000000/external-cash-ecommerce-flatart-icons-outline-flatarticons.png" alt="COD" />
        Cash on Delivery
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const total = parseInt(localStorage.getItem('cartTotal')) || 0;
      const totalSpan = document.getElementById("totalAmount");
      if (totalSpan) totalSpan.innerText = total;

      const options = document.querySelectorAll('.option');

      options.forEach(option => {
        option.addEventListener('click', () => {
          options.forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');

          const method = option.getAttribute('data-method');
          localStorage.setItem("selectedPaymentMethod", method);

          if (method === "COD") {
            localStorage.removeItem("cart");
            localStorage.removeItem("cartTotal");
            window.location.href = "checkout.html"; // Optional confirmation page
            return;
          }

          const razorpayOptions = {
            key: "rzp_test_YourTestKeyHere", // 🔑 Replace with your Razorpay test key
            amount: total * 100,
            currency: "INR",
            name: "HealthCare+",
            description: `Payment via ${method}`,
            image: "https://img.icons8.com/fluency/48/medicine.png",
            handler: function (response) {
              alert(`✅ Payment Successful!\nPayment ID: ${response.razorpay_payment_id}`);
              localStorage.removeItem("cart");
              localStorage.removeItem("cartTotal");
              window.location.href = "thankyou.html";
            },
            prefill: {
              name: "Yash Kaushik",
              email: "user@example.com",
              contact: "9999999999"
            },
            theme: {
              color: "#2e7d32"
            },
            method: {
              upi: method === "UPI",
              card: method === "Card",
              netbanking: method === "Netbanking",
              wallet: method === "Wallet"
            }
          };

          const rzp = new Razorpay(razorpayOptions);
          rzp.open();
        });
      });
    });
  </script>
</body>
</html>
